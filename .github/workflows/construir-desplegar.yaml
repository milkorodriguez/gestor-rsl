name: Construir y Desplegar a AWS

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: main

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}

    steps:
      - name: Recuperar el codigo
        uses: actions/checkout@v5

      - name: Configurar credenciales AWS
        run: |
          aws configure set aws_access_key_id "$AWS_ACCESS_KEY_ID"
          aws configure set aws_secret_access_key "$AWS_SECRET_ACCESS_KEY"
          aws configure set aws_session_token "$AWS_SESSION_TOKEN"
          aws configure set region "$AWS_REGION"

      - name: Verificar credenciales
        run: aws sts get-caller-identity

      - name: Construir imagen Docker
        run: docker build -t gestor-rsl .

      - name: Iniciar sesion en ECR
        run: |
          aws ecr get-login-password | docker login --username AWS --password-stdin ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com

      - name: Crear repositorio ECR si no existe
        run: |
          aws ecr describe-repositories --repository-names ${{ vars.NOMBRE_REPO_ECR || 'gestor-rsl' }} \
            || aws ecr create-repository --repository-name ${{ vars.NOMBRE_REPO_ECR || 'gestor-rsl' }}

      - name: Push de la imagen a ECR
        run: |
          docker tag gestor-rsl ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${{ vars.NOMBRE_REPO_ECR || 'gestor-rsl' }}:latest
          docker push ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${{ vars.NOMBRE_REPO_ECR || 'gestor-rsl' }}:latest

      - name: Instalar Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.10.5

      - name: Instalar cliente MySQL para inicializacion RDS
        run: |
          sudo apt-get update
          sudo apt-get install -y mysql-client

      - name: Inicializar Terraform
        run: terraform init -backend-config "bucket=${{ vars.BUCKET }}" -backend-config "dynamodb_table=${{ vars.LOCKS }}"
        working-directory: iac

      - name: Aplicar Terraform
        run: |
          terraform apply \
            -var="id_cuenta_aws=${{ vars.AWS_ACCOUNT_ID }}" \
            -var="nombre_rol_iam=${{ vars.NOMBRE_ROL_IAM }}" \
            -var="nombre_repo_ecr=${{ vars.NOMBRE_REPO_ECR || 'gestor-rsl' }}" \
            -var="usuario_base_datos=${{ vars.USUARIO_BASE_DATOS || 'admin' }}" \
            -var="contrasenha_base_datos=${{ secrets.CONTRASENHA_BASE_DATOS }}" \
            -auto-approve
        working-directory: iac

      - name: Forzar nuevo despliegue ECS
        run: |
          aws ecs update-service --cluster gestor-rsl-cluster --service servicio-gestor-rsl --force-new-deployment
