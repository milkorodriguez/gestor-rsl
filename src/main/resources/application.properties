spring.application.name=gestor-rsl

# --- Datasource: externalizado por variables de entorno (defaults = local) ---
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/slr_rsl?useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:none}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.sql.init.mode=never
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

server.port=8080

# --- Health check para el target group del ALB ---
management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true
